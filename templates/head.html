  :root {
    --bg: #F4F1E4;
    --surface: #FFFFFF;
    --surface-2: #ECE6D2;
    --ink: #2A2C28;
    --ink-soft: #5C5F54;
    --ink-muted: #8B8D80;
    --line: #E2DCC8;

    --accent-orange: #FF7223;
    --accent-orange-text: #C0501A;
    --accent-blue: #7B92EF;
    --accent-blue-text: #4A5FC7;
    --accent-lime: #ECFF90;
    --accent-lime-ink: #2A2C28;

    --card-grad-a: #FBD5E5;
    --card-grad-b: #FFF3B0;

    --good: #1E8A5C;
    --good-bg: #E1F3E9;
    --good-border: #BFE0CE;
    --bad: #C23B22;
    --bad-bg: #FBE7E2;
    --bad-border: #F0C6B8;

    --shadow: 0 2px 4px rgba(42,30,10,0.05), 0 14px 32px -16px rgba(42,30,10,0.22);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1E1620;
      --surface: #2A212C;
      --surface-2: #332738;
      --ink: #F3EFEA;
      --ink-soft: #C9C2C6;
      --ink-muted: #9A8FA0;
      --line: #3D2F42;

      --accent-orange: #FF8B4D;
      --accent-orange-text: #FF8B4D;
      --accent-blue: #9AAAF5;
      --accent-blue-text: #9AAAF5;
      --accent-lime: #ECFF90;
      --accent-lime-ink: #201827;

      --card-grad-a: #4A2E42;
      --card-grad-b: #4A3A1E;

      --good: #2BAE6E;
      --good-bg: #1E3A2C;
      --good-border: #2F5943;
      --bad: #EF5B4E;
      --bad-bg: #3E241F;
      --bad-border: #5C3129;

      --shadow: 0 2px 4px rgba(0,0,0,0.3), 0 14px 32px -16px rgba(0,0,0,0.6);
    }
  }
  :root[data-theme="dark"] {
    --bg: #1E1620; --surface: #2A212C; --surface-2: #332738; --ink: #F3EFEA;
    --ink-soft: #C9C2C6; --ink-muted: #9A8FA0; --line: #3D2F42;
    --accent-orange: #FF8B4D; --accent-orange-text: #FF8B4D;
    --accent-blue: #9AAAF5; --accent-blue-text: #9AAAF5;
    --accent-lime: #ECFF90; --accent-lime-ink: #201827;
    --card-grad-a: #4A2E42; --card-grad-b: #4A3A1E;
    --good: #2BAE6E; --good-bg: #1E3A2C; --good-border: #2F5943;
    --bad: #EF5B4E; --bad-bg: #3E241F; --bad-border: #5C3129;
  }
  :root[data-theme="light"] {
    --bg: #F4F1E4; --surface: #FFFFFF; --surface-2: #ECE6D2; --ink: #2A2C28;
    --ink-soft: #5C5F54; --ink-muted: #8B8D80; --line: #E2DCC8;
    --accent-orange: #FF7223; --accent-orange-text: #C0501A;
    --accent-blue: #7B92EF; --accent-blue-text: #4A5FC7;
    --accent-lime: #ECFF90; --accent-lime-ink: #2A2C28;
    --card-grad-a: #FBD5E5; --card-grad-b: #FFF3B0;
    --good: #1E8A5C; --good-bg: #E1F3E9; --good-border: #BFE0CE;
    --bad: #C23B22; --bad-bg: #FBE7E2; --bad-border: #F0C6B8;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--ink);
    font-family: 'Familjen Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .page { max-width: 1120px; margin: 0 auto; padding: 0 0 90px; }
  .display { font-family: 'Fraunces Display', Georgia, serif; font-style: italic; font-weight: 500; }
  .display-upright { font-family: 'Fraunces Display', Georgia, serif; font-style: normal; font-weight: 600; }
  .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }

  a { color: var(--accent-orange-text); }

  /* ---------- Hero ---------- */
  .hero-band {
    background: radial-gradient(120% 140% at 20% 0%, var(--card-grad-b) 0%, var(--card-grad-a) 45%, var(--bg) 85%);
    padding: 40px 32px 46px;
    border-radius: 0 0 32px 32px;
    margin-bottom: 36px;
  }
  .top-row {
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px; flex-wrap: wrap; max-width: 1056px; margin: 0 auto 30px;
  }
  .brand {
    font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink); font-weight: 700;
  }
  .status-chip {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 12px; color: var(--ink-soft); background: rgba(255,255,255,0.55);
    padding: 6px 12px; border-radius: 999px; font-weight: 500;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--good); }

  .hero-inner { max-width: 1056px; margin: 0 auto; }
  h1.hero-headline {
    font-size: clamp(32px, 5vw, 54px); line-height: 1.06; margin: 0 0 20px;
    max-width: 15ch; text-wrap: balance; color: var(--ink);
  }

  .hero-numbers { display: flex; gap: 44px; flex-wrap: wrap; align-items: baseline; }
  .hero-primary .label, .hero-secondary .label {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--ink-soft); font-weight: 700; margin: 0 0 6px;
  }
  .hero-primary .value {
    font-family: 'Familjen Grotesk', sans-serif; font-weight: 700;
    font-size: clamp(38px, 6vw, 64px); line-height: 1; color: var(--ink); margin: 0;
  }
  .hero-secondary .value {
    font-family: 'Familjen Grotesk', sans-serif; font-weight: 700;
    font-size: clamp(22px, 3vw, 30px); color: var(--ink-soft); margin: 0;
  }

  /* ---------- Stat cards ---------- */
  .stat-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px;
    padding: 0 32px; margin-bottom: 40px;
  }
  .stat-card {
    background: linear-gradient(160deg, var(--card-grad-a) 0%, var(--card-grad-b) 100%);
    border-radius: 18px; padding: 20px 18px; box-shadow: var(--shadow);
  }
  .stat-card .num-value {
    font-family: 'Familjen Grotesk', sans-serif; font-weight: 700;
    font-size: 26px; color: var(--ink); line-height: 1.05; margin: 0 0 4px;
  }
  .stat-card .num-value.good { color: var(--good); }
  .stat-card .num-value.bad { color: var(--bad); }
  .stat-card .cap {
    font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--ink-soft); font-weight: 600; margin: 0 0 8px;
  }
  .stat-card .sub { font-size: 12px; color: var(--ink-muted); margin: 0; }

  /* ---------- Sections ---------- */
  .section { padding: 0 32px; margin-bottom: 44px; }
  .section-head { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; }
  h2.section-title { font-size: 26px; margin: 0; color: var(--ink); }
  .section-note { font-size: 13px; color: var(--ink-muted); }
